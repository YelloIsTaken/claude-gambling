<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NeonBet — Hazard Online</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #080c10;
    --surface: #0d1318;
    --card: #111820;
    --border: #1e2d3d;
    --green: #00ff88;
    --gold: #ffd700;
    --red: #ff3c5f;
    --blue: #00c8ff;
    --text: #c8dae8;
    --muted: #4a6070;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Space Mono', monospace;
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* Background grid */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image:
      linear-gradient(rgba(0,255,136,0.03) 1px, transparent 1px),
      linear-gradient(90deg, rgba(0,255,136,0.03) 1px, transparent 1px);
    background-size: 40px 40px;
    pointer-events: none;
    z-index: 0;
  }

  /* HEADER */
  header {
    position: relative;
    z-index: 10;
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 18px 40px;
    border-bottom: 1px solid var(--border);
    background: rgba(8,12,16,0.95);
    backdrop-filter: blur(10px);
  }

  .logo {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 2rem;
    letter-spacing: 3px;
    color: var(--green);
    text-shadow: 0 0 20px rgba(0,255,136,0.6), 0 0 60px rgba(0,255,136,0.2);
  }

  .logo span { color: var(--gold); }

  .balance-bar {
    display: flex;
    align-items: center;
    gap: 12px;
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 8px 20px;
  }

  .balance-label { font-size: 0.65rem; color: var(--muted); text-transform: uppercase; letter-spacing: 2px; }
  .balance-amount {
    font-size: 1.3rem;
    color: var(--gold);
    font-weight: 700;
    text-shadow: 0 0 10px rgba(255,215,0,0.4);
  }

  .btn-add {
    background: var(--green);
    color: #000;
    border: none;
    border-radius: 4px;
    padding: 6px 14px;
    font-family: 'Space Mono', monospace;
    font-size: 0.75rem;
    font-weight: 700;
    cursor: pointer;
    transition: all 0.2s;
  }
  .btn-add:hover { background: #00ffaa; transform: scale(1.05); }

  /* MAIN */
  main {
    position: relative;
    z-index: 5;
    max-width: 1200px;
    margin: 0 auto;
    padding: 50px 20px;
  }

  .section-title {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 1.4rem;
    letter-spacing: 4px;
    color: var(--muted);
    text-transform: uppercase;
    margin-bottom: 30px;
    display: flex;
    align-items: center;
    gap: 14px;
  }
  .section-title::after {
    content: '';
    flex: 1;
    height: 1px;
    background: linear-gradient(90deg, var(--border), transparent);
  }

  .games-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 30px;
  }

  @media (max-width: 800px) { .games-grid { grid-template-columns: 1fr; } }

  /* GAME CARD */
  .game-card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 12px;
    overflow: hidden;
    position: relative;
  }
  .game-card::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 2px;
  }
  .game-card.mines::before { background: linear-gradient(90deg, transparent, var(--red), transparent); }
  .game-card.coinflip::before { background: linear-gradient(90deg, transparent, var(--gold), transparent); }

  .game-header {
    padding: 20px 24px 16px;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    gap: 14px;
  }

  .game-icon {
    width: 42px; height: 42px;
    border-radius: 8px;
    display: flex; align-items: center; justify-content: center;
    font-size: 1.4rem;
  }
  .mines .game-icon { background: rgba(255,60,95,0.15); border: 1px solid rgba(255,60,95,0.3); }
  .coinflip .game-icon { background: rgba(255,215,0,0.1); border: 1px solid rgba(255,215,0,0.3); }

  .game-name {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 1.6rem;
    letter-spacing: 2px;
  }
  .mines .game-name { color: var(--red); }
  .coinflip .game-name { color: var(--gold); }

  .game-body { padding: 24px; }

  /* BET CONTROLS */
  .bet-row {
    display: flex;
    align-items: center;
    gap: 8px;
    margin-bottom: 16px;
  }

  .bet-label { font-size: 0.65rem; color: var(--muted); text-transform: uppercase; letter-spacing: 2px; width: 70px; flex-shrink: 0; }

  .bet-input {
    flex: 1;
    background: var(--surface);
    border: 1px solid var(--border);
    color: var(--text);
    font-family: 'Space Mono', monospace;
    font-size: 0.9rem;
    padding: 8px 12px;
    border-radius: 5px;
    outline: none;
    transition: border-color 0.2s;
  }
  .bet-input:focus { border-color: var(--green); }

  .bet-quick {
    display: flex; gap: 6px;
  }
  .bet-quick button {
    background: var(--surface);
    border: 1px solid var(--border);
    color: var(--muted);
    font-family: 'Space Mono', monospace;
    font-size: 0.7rem;
    padding: 5px 10px;
    border-radius: 4px;
    cursor: pointer;
    transition: all 0.15s;
  }
  .bet-quick button:hover { border-color: var(--green); color: var(--green); }

  /* MINES GRID */
  .mines-grid {
    display: grid;
    grid-template-columns: repeat(5, 1fr);
    gap: 6px;
    margin: 20px 0;
  }

  .mine-cell {
    aspect-ratio: 1;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 6px;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 1.1rem;
    transition: all 0.15s;
    position: relative;
    overflow: hidden;
  }
  .mine-cell:hover:not(.revealed) {
    border-color: var(--green);
    background: rgba(0,255,136,0.07);
    transform: scale(1.05);
  }
  .mine-cell.gem {
    background: rgba(0,255,136,0.1);
    border-color: var(--green);
    animation: gemReveal 0.3s ease;
  }
  .mine-cell.bomb {
    background: rgba(255,60,95,0.15);
    border-color: var(--red);
    animation: shake 0.3s ease;
  }
  .mine-cell.revealed { cursor: default; }

  @keyframes gemReveal {
    0% { transform: scale(0.5); opacity: 0; }
    60% { transform: scale(1.15); }
    100% { transform: scale(1); opacity: 1; }
  }
  @keyframes shake {
    0%,100% { transform: translateX(0); }
    25% { transform: translateX(-4px); }
    75% { transform: translateX(4px); }
  }

  .mines-info {
    display: flex;
    gap: 12px;
    margin-bottom: 14px;
  }
  .mines-info-item {
    flex: 1;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 10px;
    text-align: center;
  }
  .mines-info-item .val {
    font-size: 1.1rem;
    font-weight: 700;
    color: var(--green);
  }
  .mines-info-item .lbl {
    font-size: 0.6rem;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 1px;
    margin-top: 2px;
  }

  /* MINES COUNT SELECT */
  .mines-count-row {
    display: flex; align-items: center; gap: 8px; margin-bottom: 16px;
  }
  .mines-count-row select {
    flex: 1;
    background: var(--surface);
    border: 1px solid var(--border);
    color: var(--text);
    font-family: 'Space Mono', monospace;
    font-size: 0.85rem;
    padding: 8px 12px;
    border-radius: 5px;
    outline: none;
    cursor: pointer;
  }

  /* COINFLIP */
  .coin-container {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 24px;
    padding: 10px 0 20px;
  }

  .coin-pick {
    display: flex;
    gap: 14px;
    width: 100%;
  }

  .coin-option {
    flex: 1;
    padding: 14px;
    background: var(--surface);
    border: 2px solid var(--border);
    border-radius: 8px;
    cursor: pointer;
    text-align: center;
    transition: all 0.2s;
    font-family: 'Space Mono', monospace;
  }
  .coin-option:hover { border-color: var(--gold); }
  .coin-option.selected.heads { border-color: var(--gold); background: rgba(255,215,0,0.08); }
  .coin-option.selected.tails { border-color: var(--blue); background: rgba(0,200,255,0.08); }

  .coin-option .emoji { font-size: 2rem; display: block; margin-bottom: 6px; }
  .coin-option .name { font-size: 0.75rem; text-transform: uppercase; letter-spacing: 2px; color: var(--muted); }
  .coin-option.selected.heads .name { color: var(--gold); }
  .coin-option.selected.tails .name { color: var(--blue); }

  .coin-visual {
    width: 100px; height: 100px;
    border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    font-size: 2.5rem;
    position: relative;
    transition: all 0.3s;
    border: 3px solid var(--border);
    background: radial-gradient(circle at 35% 35%, #2a2a2a, #111);
    box-shadow: 0 0 30px rgba(0,0,0,0.5), inset 0 1px 0 rgba(255,255,255,0.05);
  }
  .coin-visual.flipping {
    animation: coinFlip 1s ease;
  }
  .coin-visual.won { border-color: var(--green); box-shadow: 0 0 30px rgba(0,255,136,0.4); }
  .coin-visual.lost { border-color: var(--red); box-shadow: 0 0 30px rgba(255,60,95,0.4); }

  @keyframes coinFlip {
    0% { transform: rotateY(0deg) scale(1); }
    25% { transform: rotateY(360deg) scale(1.1); }
    50% { transform: rotateY(720deg) scale(1); }
    75% { transform: rotateY(1080deg) scale(1.1); }
    100% { transform: rotateY(1440deg) scale(1); }
  }

  /* BUTTONS */
  .btn-play {
    width: 100%;
    padding: 14px;
    border: none;
    border-radius: 7px;
    font-family: 'Bebas Neue', sans-serif;
    font-size: 1.3rem;
    letter-spacing: 3px;
    cursor: pointer;
    transition: all 0.2s;
    margin-top: 8px;
  }

  .btn-play.green {
    background: linear-gradient(135deg, #00cc66, #00ff88);
    color: #000;
    box-shadow: 0 4px 20px rgba(0,255,136,0.3);
  }
  .btn-play.green:hover { transform: translateY(-2px); box-shadow: 0 6px 30px rgba(0,255,136,0.5); }

  .btn-play.gold {
    background: linear-gradient(135deg, #cc9900, #ffd700);
    color: #000;
    box-shadow: 0 4px 20px rgba(255,215,0,0.25);
  }
  .btn-play.gold:hover { transform: translateY(-2px); box-shadow: 0 6px 30px rgba(255,215,0,0.4); }

  .btn-play.red {
    background: linear-gradient(135deg, #cc2244, #ff3c5f);
    color: #fff;
    box-shadow: 0 4px 20px rgba(255,60,95,0.3);
  }
  .btn-play.red:hover { transform: translateY(-2px); }

  .btn-play:disabled { opacity: 0.4; cursor: not-allowed; transform: none; }

  /* RESULT MESSAGE */
  .result-msg {
    text-align: center;
    padding: 10px;
    border-radius: 6px;
    font-size: 0.85rem;
    font-weight: 700;
    letter-spacing: 1px;
    margin-top: 10px;
    display: none;
  }
  .result-msg.win { background: rgba(0,255,136,0.1); border: 1px solid var(--green); color: var(--green); display: block; }
  .result-msg.lose { background: rgba(255,60,95,0.1); border: 1px solid var(--red); color: var(--red); display: block; }

  /* HISTORY */
  .history-section { margin-top: 50px; }
  .history-list {
    display: flex;
    gap: 8px;
    flex-wrap: wrap;
  }
  .history-chip {
    padding: 5px 14px;
    border-radius: 20px;
    font-size: 0.7rem;
    letter-spacing: 1px;
    font-weight: 700;
  }
  .history-chip.win { background: rgba(0,255,136,0.1); border: 1px solid rgba(0,255,136,0.3); color: var(--green); }
  .history-chip.lose { background: rgba(255,60,95,0.1); border: 1px solid rgba(255,60,95,0.3); color: var(--red); }

  /* CASHOUT GLOW */
  .cashout-amount {
    color: var(--green);
    font-weight: 700;
    text-shadow: 0 0 10px rgba(0,255,136,0.5);
  }
</style>
</head>
<body>

<header>
  <div class="logo">Neon<span>Bet</span></div>
  <div class="balance-bar">
    <div>
      <div class="balance-label">Saldo</div>
      <div class="balance-amount" id="balance">1 000,00 PLN</div>
    </div>
    <button class="btn-add" onclick="addFunds()">+500</button>
  </div>
</header>

<main>
  <div class="section-title">🎮 Wybierz grę</div>

  <div class="games-grid">

    <!-- MINES -->
    <div class="game-card mines">
      <div class="game-header">
        <div class="game-icon">💣</div>
        <div>
          <div class="game-name">MINES</div>
          <div style="font-size:0.65rem;color:var(--muted);letter-spacing:1px">Unikaj min, zbieraj diamenty</div>
        </div>
      </div>
      <div class="game-body">

        <div class="bet-row">
          <span class="bet-label">Zakład</span>
          <input class="bet-input" type="number" id="mines-bet" value="50" min="1" max="10000">
        </div>
        <div class="bet-row" style="margin-top:-8px;">
          <span class="bet-label"></span>
          <div class="bet-quick">
            <button onclick="setBet('mines-bet', 0.5)">½</button>
            <button onclick="setBet('mines-bet', 2)">2×</button>
            <button onclick="setMax('mines-bet')">MAX</button>
          </div>
        </div>

        <div class="mines-count-row">
          <span class="bet-label">Miny</span>
          <select id="mines-count">
            <option value="1">1 mina</option>
            <option value="3" selected>3 miny</option>
            <option value="5">5 min</option>
            <option value="10">10 min</option>
            <option value="15">15 min</option>
          </select>
        </div>

        <div class="mines-info">
          <div class="mines-info-item">
            <div class="val" id="mines-multiplier">1.00×</div>
            <div class="lbl">Mnożnik</div>
          </div>
          <div class="mines-info-item">
            <div class="val" id="mines-potential">50,00</div>
            <div class="lbl">Wypłata</div>
          </div>
          <div class="mines-info-item">
            <div class="val" id="mines-found">0</div>
            <div class="lbl">Diamenty</div>
          </div>
        </div>

        <div class="mines-grid" id="mines-grid"></div>

        <div id="mines-result" class="result-msg"></div>

        <button class="btn-play green" id="btn-mines-start" onclick="startMines()">GRAJ</button>
        <button class="btn-play red" id="btn-mines-cashout" onclick="cashoutMines()" style="display:none">WYPŁAĆ <span id="cashout-val"></span></button>

      </div>
    </div>

    <!-- COINFLIP -->
    <div class="game-card coinflip">
      <div class="game-header">
        <div class="game-icon">🪙</div>
        <div>
          <div class="game-name">COINFLIP</div>
          <div style="font-size:0.65rem;color:var(--muted);letter-spacing:1px">Orzeł czy reszka — szansa 50/50</div>
        </div>
      </div>
      <div class="game-body">

        <div class="bet-row">
          <span class="bet-label">Zakład</span>
          <input class="bet-input" type="number" id="coin-bet" value="100" min="1" max="10000">
        </div>
        <div class="bet-row" style="margin-top:-8px;">
          <span class="bet-label"></span>
          <div class="bet-quick">
            <button onclick="setBet('coin-bet', 0.5)">½</button>
            <button onclick="setBet('coin-bet', 2)">2×</button>
            <button onclick="setMax('coin-bet')">MAX</button>
          </div>
        </div>

        <div class="coin-container">
          <div class="coin-pick">
            <div class="coin-option heads selected" id="opt-heads" onclick="pickSide('heads')">
              <span class="emoji">🦅</span>
              <div class="name">Orzeł</div>
            </div>
            <div class="coin-option tails" id="opt-tails" onclick="pickSide('tails')">
              <span class="emoji">🌐</span>
              <div class="name">Reszka</div>
            </div>
          </div>

          <div class="coin-visual" id="coin-visual">🪙</div>

          <div style="font-size:0.75rem; color:var(--muted); letter-spacing:1px">
            Wygrana: <span style="color:var(--gold); font-weight:700" id="coin-payout">200,00 PLN</span>
          </div>
        </div>

        <div id="coin-result" class="result-msg"></div>

        <button class="btn-play gold" id="btn-coin" onclick="flipCoin()">RZUĆ MONETĄ</button>

      </div>
    </div>

  </div>

  <!-- HISTORY -->
  <div class="history-section">
    <div class="section-title">📋 Historia rund</div>
    <div class="history-list" id="history-list">
      <span style="color:var(--muted);font-size:0.75rem">Brak historii — zagraj pierwszą rundę!</span>
    </div>
  </div>
</main>

<script>
  let balance = 1000;
  const history = [];

  /* ——— UTILS ——— */
  function fmt(n) {
    return n.toLocaleString('pl-PL', { minimumFractionDigits: 2, maximumFractionDigits: 2 });
  }

  function updateBalance(delta) {
    balance = Math.max(0, balance + delta);
    document.getElementById('balance').textContent = fmt(balance) + ' PLN';
  }

  function addFunds() {
    updateBalance(500);
  }

  function setBet(id, mult) {
    const inp = document.getElementById(id);
    inp.value = Math.max(1, Math.round(parseFloat(inp.value) * mult));
    if (id === 'coin-bet') updateCoinPayout();
  }

  function setMax(id) {
    document.getElementById(id).value = balance;
    if (id === 'coin-bet') updateCoinPayout();
  }

  function addHistory(game, win, amount) {
    history.unshift({ game, win, amount });
    const list = document.getElementById('history-list');
    if (history.length === 1) list.innerHTML = '';
    const chip = document.createElement('div');
    chip.className = 'history-chip ' + (win ? 'win' : 'lose');
    chip.textContent = (win ? '+' : '-') + fmt(Math.abs(amount)) + ' (' + game + ')';
    list.prepend(chip);
    if (history.length > 20) list.lastChild?.remove();
  }

  /* ——— MINES ——— */
  let minesActive = false;
  let minePositions = [];
  let revealedCount = 0;
  let minesMultiplier = 1;
  const TOTAL_CELLS = 25;

  function buildGrid() {
    const grid = document.getElementById('mines-grid');
    grid.innerHTML = '';
    for (let i = 0; i < TOTAL_CELLS; i++) {
      const cell = document.createElement('div');
      cell.className = 'mine-cell';
      cell.dataset.index = i;
      cell.onclick = () => revealCell(i);
      grid.appendChild(cell);
    }
  }

  function getMinesMultiplier(revealed, mineCount) {
    const safe = TOTAL_CELLS - mineCount;
    if (revealed === 0) return 1;
    let mult = 1;
    for (let i = 0; i < revealed; i++) {
      mult *= (safe - i) / (TOTAL_CELLS - i) < 0.01 ? 1 : (TOTAL_CELLS - mineCount) / (TOTAL_CELLS - i - mineCount + 1);
      // Simpler house-edge multiplier
    }
    // Simple approximation: each gem ~= ×(TOTAL/safe * 0.97)
    const base = (TOTAL_CELLS / (TOTAL_CELLS - mineCount)) * 0.97;
    return Math.pow(base, revealed);
  }

  function startMines() {
    const bet = parseFloat(document.getElementById('mines-bet').value);
    if (!bet || bet > balance || bet < 1) {
      alert('Nieprawidłowy zakład!'); return;
    }
    const mineCount = parseInt(document.getElementById('mines-count').value);

    updateBalance(-bet);
    minesActive = true;
    revealedCount = 0;
    minesMultiplier = 1;

    // Place mines
    minePositions = [];
    while (minePositions.length < mineCount) {
      const r = Math.floor(Math.random() * TOTAL_CELLS);
      if (!minePositions.includes(r)) minePositions.push(r);
    }

    buildGrid();
    document.getElementById('btn-mines-start').style.display = 'none';
    document.getElementById('btn-mines-cashout').style.display = 'block';
    document.getElementById('mines-result').className = 'result-msg';
    document.getElementById('mines-found').textContent = '0';
    document.getElementById('mines-multiplier').textContent = '1.00×';
    document.getElementById('mines-potential').textContent = fmt(bet);
  }

  function revealCell(index) {
    if (!minesActive) return;
    const cell = document.querySelector(`.mine-cell[data-index="${index}"]`);
    if (!cell || cell.classList.contains('revealed')) return;

    cell.classList.add('revealed');
    const bet = parseFloat(document.getElementById('mines-bet').value);
    const mineCount = parseInt(document.getElementById('mines-count').value);

    if (minePositions.includes(index)) {
      // BOMB!
      cell.classList.add('bomb');
      cell.textContent = '💣';
      minesActive = false;
      // Reveal all mines
      minePositions.forEach(mp => {
        const c = document.querySelector(`.mine-cell[data-index="${mp}"]`);
        if (c && !c.classList.contains('revealed')) {
          c.classList.add('revealed', 'bomb');
          c.textContent = '💣';
        }
      });
      const res = document.getElementById('mines-result');
      res.className = 'result-msg lose';
      res.textContent = `💥 BOOM! Straciłeś ${fmt(bet)} PLN`;
      document.getElementById('btn-mines-cashout').style.display = 'none';
      document.getElementById('btn-mines-start').style.display = 'block';
      document.getElementById('btn-mines-start').textContent = 'GRAJ PONOWNIE';
      addHistory('Mines', false, bet);
    } else {
      // GEM!
      cell.classList.add('gem');
      cell.textContent = '💎';
      revealedCount++;
      minesMultiplier = getMinesMultiplier(revealedCount, mineCount);
      const payout = bet * minesMultiplier;
      document.getElementById('mines-found').textContent = revealedCount;
      document.getElementById('mines-multiplier').textContent = minesMultiplier.toFixed(2) + '×';
      document.getElementById('mines-potential').textContent = fmt(payout);
      document.getElementById('cashout-val').innerHTML = `<span class="cashout-amount">${fmt(payout)} PLN</span>`;

      const safe = TOTAL_CELLS - mineCount;
      if (revealedCount === safe) {
        cashoutMines();
      }
    }
  }

  function cashoutMines() {
    if (!minesActive) return;
    minesActive = false;
    const bet = parseFloat(document.getElementById('mines-bet').value);
    const payout = bet * minesMultiplier;
    updateBalance(payout);
    // Reveal all hidden mines
    minePositions.forEach(mp => {
      const c = document.querySelector(`.mine-cell[data-index="${mp}"]`);
      if (c && !c.classList.contains('revealed')) {
        c.classList.add('revealed', 'bomb');
        c.textContent = '💣';
      }
    });
    const res = document.getElementById('mines-result');
    res.className = 'result-msg win';
    res.textContent = `✅ Wypłacono ${fmt(payout)} PLN (×${minesMultiplier.toFixed(2)})`;
    document.getElementById('btn-mines-cashout').style.display = 'none';
    document.getElementById('btn-mines-start').style.display = 'block';
    document.getElementById('btn-mines-start').textContent = 'GRAJ PONOWNIE';
    addHistory('Mines', true, payout - bet);
  }

  buildGrid();

  /* ——— COINFLIP ——— */
  let coinChoice = 'heads';
  let coinFlipping = false;

  function pickSide(side) {
    if (coinFlipping) return;
    coinChoice = side;
    document.getElementById('opt-heads').className = 'coin-option heads' + (side === 'heads' ? ' selected' : '');
    document.getElementById('opt-tails').className = 'coin-option tails' + (side === 'tails' ? ' selected' : '');
  }

  function updateCoinPayout() {
    const bet = parseFloat(document.getElementById('coin-bet').value) || 0;
    document.getElementById('coin-payout').textContent = fmt(bet * 2) + ' PLN';
  }

  document.getElementById('coin-bet').addEventListener('input', updateCoinPayout);

  function flipCoin() {
    if (coinFlipping) return;
    const bet = parseFloat(document.getElementById('coin-bet').value);
    if (!bet || bet > balance || bet < 1) { alert('Nieprawidłowy zakład!'); return; }

    updateBalance(-bet);
    coinFlipping = true;
    document.getElementById('btn-coin').disabled = true;
    document.getElementById('coin-result').className = 'result-msg';

    const coin = document.getElementById('coin-visual');
    coin.className = 'coin-visual flipping';
    coin.textContent = '🪙';

    const result = Math.random() < 0.5 ? 'heads' : 'tails';

    setTimeout(() => {
      coin.classList.remove('flipping');
      const won = result === coinChoice;
      coin.textContent = result === 'heads' ? '🦅' : '🌐';
      coin.classList.add(won ? 'won' : 'lost');

      const res = document.getElementById('coin-result');
      if (won) {
        updateBalance(bet * 2);
        res.className = 'result-msg win';
        res.textContent = `🎉 Wygrałeś! +${fmt(bet)} PLN`;
        addHistory('Coinflip', true, bet);
      } else {
        res.className = 'result-msg lose';
        res.textContent = `😢 Przegrana! -${fmt(bet)} PLN`;
        addHistory('Coinflip', false, bet);
      }

      coinFlipping = false;
      document.getElementById('btn-coin').disabled = false;

      setTimeout(() => {
        coin.classList.remove('won', 'lost');
        coin.textContent = '🪙';
      }, 2000);
    }, 1200);
  }
</script>
</body>
</html>
